<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>โจ๊กหมู - ระบบสร้างภาพแนวทาง V2 (New Layout)</title>
    <!-- โหลดฟอนต์ให้เหมือนต้นฉบับ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800;900&family=Prompt:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      :root {
        --bg-dark: #0f172a;
        --bg-panel: #1e293b;
        --primary: #f43f5e;
        --primary-hover: #e11d48;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border: #334155;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Prompt', sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* === DASHBOARD LAYOUT === */
      .dashboard {
        display: flex;
        height: 100vh;
      }
      .sidebar {
        width: 400px;
        background-color: var(--bg-panel);
        padding: 30px;
        border-right: 1px solid var(--border);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
        z-index: 10;
      }
      .main-view {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        overflow-y: auto;
        position: relative;
      }

      /* === SIDEBAR CONTROLS === */
      .app-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 2rem;
        font-weight: 900;
        color: white;
      }
      .app-brand svg {
        height: 1em;
        fill: var(--primary);
      }
      .app-desc {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-top: -10px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .control-group label {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-muted);
      }
      .form-control {
        background: #0f172a;
        color: white;
        border: 2px solid var(--border);
        padding: 14px 16px;
        border-radius: 12px;
        font-family: 'Prompt', sans-serif;
        font-size: 1.1rem;
        outline: none;
        transition: all 0.2s;
        cursor: pointer;
      }
      .form-control:focus,
      .form-control:hover {
        border-color: var(--primary);
      }

      .btn-generate {
        background: linear-gradient(135deg, var(--primary), #be123c);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 14px;
        font-family: 'Prompt', sans-serif;
        font-size: 1.25rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 10px 25px rgba(244, 63, 94, 0.3);
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .btn-generate:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(244, 63, 94, 0.5);
      }
      .btn-generate:active {
        transform: translateY(1px);
      }

      /* === PREVIEW AREA === */
      .preview-wrapper {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .preview-container {
        width: 100%;
        /* ปรับสัดส่วนให้เป็น 1:1 จตุรัส */
        aspect-ratio: 1 / 1;
        background: rgba(0, 0, 0, 0.3);
        border: 2px dashed rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }
      .preview-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: none;
      }
      .empty-placeholder {
        text-align: center;
        color: var(--text-muted);
        padding: 20px;
      }
      .empty-placeholder span {
        font-size: 4rem;
        display: block;
        margin-bottom: 10px;
      }

      /* === ACTION BUTTONS === */
      .action-bar {
        display: none;
        flex-wrap: wrap;
        gap: 12px;
        width: 100%;
        justify-content: center;
      }
      .btn-action {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        color: white;
        padding: 12px 20px;
        border-radius: 12px;
        font-family: 'Prompt', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-action:hover {
        background: #334155;
        border-color: #475569;
        transform: translateY(-2px);
      }
      .btn-action.save {
        color: #38bdf8;
        border-color: #0284c7;
      }
      .btn-action.share {
        color: #34d399;
        border-color: #059669;
      }
      .btn-action.copy {
        color: #fbbf24;
        border-color: #d97706;
      }

      /* === LOADING SPINNER === */
      .loader-overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(5px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
        border-radius: 24px;
        display: none;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* =========================================================
         NEW HIDDEN RENDER TEMPLATE (MODERN PREMIUM LAYOUT)
         ========================================================= */
      .render-container {
        position: fixed;
        top: 0;
        left: -9999px;
        width: 1080px;
        height: 1080px; /* ปรับเป็น 1080x1080 */
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        font-family: 'Kanit', sans-serif;
      }
      .canvas-board {
        width: 1080px;
        height: 1080px; /* ปรับเป็น 1080x1080 */
        background: #f1f5f9;
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* โซนหัว (Header) */
      .cb-header {
        height: 280px; /* ลดความสูงลงให้พอดีกรอบ 1:1 */
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
        border-bottom-left-radius: 60px;
        border-bottom-right-radius: 60px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 10px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        z-index: 5;
      }
      /* ลวดลาย Background อ่อนๆ ใน Header */
      .cb-header::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.1) 2px,
          transparent 2px
        );
        background-size: 30px 30px;
        border-bottom-left-radius: 60px;
        border-bottom-right-radius: 60px;
        z-index: 1;
      }
      .cb-title {
        font-size: 90px; /* ปรับลดขนาดลงนิดหน่อย */
        font-weight: 900;
        color: #fde047; /* สีเหลืองทองสว่าง */
        text-align: center;
        text-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        margin-bottom: 20px;
        z-index: 4;
        position: relative;
        letter-spacing: 2px;
      }
      .cb-date-pill {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        color: #ffffff;
        padding: 10px 40px;
        border-radius: 50px;
        font-size: 32px; /* เล็กลงนิดนึง */
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 15px;
        z-index: 3;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      .date-icon {
        width: 35px;
        height: 35px;
        color: #fde047;
      }
      /* ธงชาติแบบลอย 3D */
      .cb-flag-real {
        position: absolute;
        top: 30px;
        left: 30px;
        width: 130px;
        height: 85px;
        border-radius: 12px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        object-fit: cover;
        z-index: 4;
        border: 4px solid rgba(255, 255, 255, 0.8);
      }
      /* ธงชาติขนาดยักษ์จางๆ มุมขวา */
      .cb-flag-bg {
        position: absolute;
        top: -30px;
        right: -30px;
        width: 250px;
        height: 250px;
        border-radius: 50%;
        object-fit: cover;
        opacity: 0.15;
        z-index: 2;
        filter: grayscale(20%);
        mask-image: radial-gradient(white, black);
        -webkit-mask-image: -webkit-radial-gradient(white, black);
      }

      /* โซนเนื้อหา (Body) */
      .cb-body {
        flex: 1;
        padding: 25px 40px; /* ลดช่องว่างบนล่างลง */
        display: grid;
        grid-template-columns: 460px 1fr;
        grid-template-rows: auto auto;
        gap: 20px 30px; /* ลดระยะห่างแนวตั้งระหว่างกล่อง */
        z-index: 2;
        margin-top: -30px; /* ดึงการ์ดขึ้นไปทับ Header ให้มีมิติ */
      }

      /* สไตล์กล่องร่วม (Modern Card UI) */
      .box {
        background: #ffffff;
        border-radius: 40px; /* มุมมนใหญ่ขึ้น */
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow: 0 25px 50px rgba(15, 23, 42, 0.08); /* เงานุ่ม */
        border: 2px solid #ffffff; /* ให้แสงสะท้อนขอบ */
      }

      /* ป้ายหัวข้อแบบ Modern Badge */
      .brush-header {
        background: #f0f9ff;
        color: #0369a1;
        font-size: 28px; /* เล็กลงเพื่อให้พอดีกรอบ 1080 */
        font-weight: 800;
        padding: 8px 40px;
        border-radius: 50px;
        display: inline-block;
        margin: 0 auto;
        margin-top: 15px;
        margin-bottom: 15px;
        border: 2px solid #bae6fd;
      }
      .brush-header.red {
        background: #fff1f2;
        color: #e11d48;
        border: 2px solid #fecdd3;
      }

      /* --- กล่อง 1: เด่น (ซ้ายบน) --- */
      .box-den {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        border-radius: 40px;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-bottom: 15px;
        box-shadow: 0 25px 50px rgba(15, 23, 42, 0.2);
        border: 2px solid #334155;
      }
      .den-tag {
        background: linear-gradient(135deg, #f43f5e, #be123c);
        color: white;
        font-size: 38px;
        font-weight: 800;
        padding: 8px 60px;
        border-radius: 0 0 35px 35px;
        margin-top: 0;
        margin-bottom: 15px;
        z-index: 2;
        box-shadow: 0 10px 25px rgba(225, 29, 72, 0.4);
      }
      .den-numbers {
        display: flex;
        align-items: baseline;
        justify-content: center;
        z-index: 2;
        line-height: 0.9;
        gap: 15px;
      }
      .den-num-1 {
        font-size: 210px;
        font-weight: 900;
        color: #ffffff;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .den-num-2 {
        font-size: 210px;
        font-weight: 900;
        color: #f43f5e;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      /* --- กล่อง 2: สองตัว (ขวาบน) --- */
      .box-2d {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
      }
      .grid-2d {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px 10px;
        padding: 0 30px;
        text-align: center;
      }
      .num-item {
        font-size: 55px; /* ปรับขนาดให้พอดีขึ้น */
        font-weight: 800;
        color: #0f172a;
      }
      .divider-dashed {
        height: 3px;
        background-image: linear-gradient(
          to right,
          #cbd5e1 50%,
          transparent 50%
        );
        background-size: 25px 100%;
        margin: 20px 40px;
        opacity: 0.6;
      }
      .double-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 25px;
        margin-bottom: 25px;
      }
      .num-double {
        font-size: 55px;
        font-weight: 800;
        color: #e11d48;
      }

      /* --- กล่อง 3: วิ่ง/รูด (ซ้ายล่าง) --- */
      .box-run {
        grid-column: 1 / 2;
        grid-row: 2 / 3;
        justify-content: center;
        align-items: center;
      }
      .run-text {
        font-size: 95px;
        font-weight: 900;
        color: #0f172a;
        margin-top: 5px;
        margin-bottom: 20px;
      }

      /* --- กล่อง 4: สามตัวตรง (ขวาล่าง) --- */
      .box-3d {
        grid-column: 2 / 3;
        grid-row: 2 / 3;
      }
      .grid-3d {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px 5px;
        padding: 0 15px 25px;
        text-align: center;
      }
      .num-3item {
        font-size: 44px;
        font-weight: 800;
        color: #0f172a;
        position: relative;
      }
      /* จุดสีแดงคั่น */
      .num-3item:not(:nth-child(4n))::after {
        content: '';
        position: absolute;
        right: -8px;
        top: 50%;
        transform: translateY(-50%);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: #f43f5e;
      }

      /* โซน Footer (แบรนด์ดิ้ง) แบบแคปซูลลอย */
      .cb-footer {
        height: 80px; /* ลดความสูงลง */
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px; /* ลดระยะห่างด้านล่าง */
        z-index: 5;
      }
      .cb-brand-pill {
        background: #ffffff;
        padding: 10px 45px;
        border-radius: 50px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        display: flex;
        align-items: center;
        gap: 15px;
        border: 2px solid #f1f5f9;
      }
      .cb-brand {
        font-size: 32px;
        font-weight: 800;
        color: #0f172a;
      }
      .cb-brand svg {
        height: 35px;
        fill: #e11d48;
      }

      @media (max-width: 800px) {
        .dashboard {
          flex-direction: column;
          height: auto;
        }
        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--border);
          padding: 20px;
        }
        .main-view {
          min-height: 600px;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- DASHBOARD UI -->
    <div class="dashboard">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="app-brand">
          <svg viewBox="0 0 1200 1227">
            <path
              d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z"
            />
          </svg>
          โจ๊กหมู
        </div>
        <div class="app-desc">Image Generator V2 - Layout ใหม่!</div>

        <div class="control-group">
          <label>ประเภทหวย</label>
          <select id="lotteryType" class="form-control">
            <optgroup label="🇹🇭 หวยไทย">
              <option value="thai_gov">หวยรัฐบาลไทย</option>
            </optgroup>
            <optgroup label="🇱🇦 หวยลาว">

              <option value="lao_dev" selected>ลาว พัฒนา</option>
              <option value="lao_extra">ลาว Extra</option>
              <option value="lao_tv">ลาว TV</option>
              <option value="lao_hd">ลาว HD</option>
              <option value="lao_star">ลาว Star</option>
              <option value="lao_samakkhi">ลาว สามัคคี</option>
              <option value="lao_asean">ลาว อาเซียน</option>
              <option value="lao_vip">ลาว VIP</option>
              <option value="lao_samakkhi_vip">ลาว สามัคคี VIP</option>
              <option value="lao_star_vip">ลาว Star VIP</option>
              <option value="lao_redcross">ลาว กาชาด</option>
            </optgroup>
            <optgroup label="🇻🇳 หวยฮานอย">
              <option value="hanoi_normal">ฮานอย ปกติ</option>
              <option value="hanoi_special">ฮานอย พิเศษ</option>
              <option value="hanoi_vip">ฮานอย VIP</option>
              <option value="hanoi_extra">ฮานอย EXTRA</option>
              <option value="hanoi_star">ฮานอย Star</option>
              <option value="hanoi_asean">ฮานอย อาเซียน</option>
              <option value="hanoi_hd">ฮานอย HD</option>
              <option value="hanoi_tv">ฮานอย TV</option>
              <option value="hanoi_redcross">ฮานอย กาชาด</option>
              <option value="hanoi_samakkhi">ฮานอย สามัคคี</option>
              <option value="hanoi_dev">ฮานอย พัฒนา</option>
              <option value="hanoi_late">ฮานอย รอบดึก</option>
            </optgroup>
            <optgroup label="🇲🇾 หวยมาเลย์">
              <option value="malay_normal">มาเลย์ ปกติ</option>
              <option value="malay_vip">มาเลย์ VIP</option>
              <option value="malay_star">มาเลย์ Star</option>
            </optgroup>
            <optgroup label="📈 หวยหุ้นต่างประเทศ">
              <option value="stock_thai">ไทย (ปกติ)</option>
              <option value="stock_thai_evening">ไทยเย็น</option>
              <option value="stock_ch9">หุ้นช่อง 9</option>
              <option value="stock_nikkei_m">นิเคอิ (เช้า)</option>
              <option value="stock_nikkei_a">นิเคอิ (บ่าย)</option>
              <option value="stock_china_m">จีน (เช้า)</option>
              <option value="stock_china_a">จีน (บ่าย)</option>
              <option value="stock_hsi_m">ฮั่งเส็ง (เช้า)</option>
              <option value="stock_hsi_a">ฮั่งเส็ง (บ่าย)</option>
              <option value="stock_taiwan">ไต้หวัน</option>
              <option value="stock_korea">เกาหลี</option>
              <option value="stock_sg">สิงคโปร์</option>
              <option value="stock_india">อินเดีย</option>
              <option value="stock_egypt">อียิปต์</option>
              <option value="stock_russia">รัสเซีย</option>
              <option value="stock_ftse">อังกฤษ</option>
              <option value="stock_dax">เยอรมัน</option>
              <option value="stock_dow">ดาวโจนส์ ปกติ</option>
              <option value="stock_euro">ยูโร</option>
            </optgroup>
            <optgroup label="🎯 ยี่กี">
              <option value="yeekee_normal">ยี่กี ธรรมดา</option>
              <option value="yeekee_vip">ยี่กี VIP</option>
              <option value="yeekee_star">ยี่กี Star</option>
            </optgroup>
          </select>
        </div>

        <div class="control-group">
          <label>วันที่งวด (ระบุเพื่อสร้างในภาพ)</label>
          <input type="date" id="dateInput" class="form-control" />
        </div>

        <button class="btn-generate" onclick="generateImage()">
          🎲 สุ่มเลข & สร้างรูป
        </button>
      </div>

      <!-- MAIN VIEW (PREVIEW) -->
      <div class="main-view">
        <div class="preview-wrapper">
          <div class="preview-container" id="previewContainer">
            <!-- Loading -->
            <div id="loader" class="loader-overlay">
              <div class="spinner"></div>
              <p style="font-weight: 600; letter-spacing: 1px">
                กำลังประมวลผลภาพ Layout ใหม่...
              </p>
            </div>

      function getFlagUrl(code) {
        return `https://flagcdn.com/w320/${code}.png`

      // แปลงวันที่เป็น "วันที่ X เดือน YYYY"
      function getFullThaiDate(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number)
        const day = parseInt(d, 10)
        const month = THAI_MONTHS[m - 1]
        const year = y + 543
        return `วันที่ ${day} ${month} ${year}`
      }

      function getTodayStr() {
        const d = new Date()
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`
      }

      function secureRandom(min, max) {
        const array = new Uint32Array(1)
        window.crypto.getRandomValues(array)
        return Math.floor((array[0] / (0xffffffff + 1)) * (max - min + 1)) + min
      }

      function secureRandom(min, max) {
        const array = new Uint32Array(1)
        window.crypto.getRandomValues(array)
        return Math.floor((array[0] / (0xffffffff + 1)) * (max - min + 1)) + min
      }

      // สร้าง Set ของเลขไม่ซ้ำ รับ forced เป็น array ที่ต้องการใส่ก่อน
      function getUniqueNumbers(count, digits, forced = []) {
        const set = new Set(forced.map(n => String(n).padStart(digits, '0')))
        const max = Math.pow(10, digits) - 1
        const limit = Math.min(count, max + 1)
        let tries = 0
        while (set.size < limit && tries++ < 9999) {
          set.add(String(secureRandom(0, max)).padStart(digits, '0'))
        }
        return [...set]
      }

      // ── Logic หลัก ────────────────────────────────────────────────
      function generateLogic() {
        // 1. เลขเด่น 2 ตัว (1-9 ไม่ซ้ำ)
        let den1 = secureRandom(1, 9)
        let den2
        do {
          den2 = secureRandom(1, 9)
        } while (den1 === den2)

        // 2. เบิ้ลเด่น 2 ตัว (คงไว้เหมือนเดิม)
        const db1 = `${den1}${den1}`
        const db2 = `${den2}${den2}`

        // 3. สองตัว 8 ชุด
        //    forced = คู่เด่นทั้ง 4 แบบ + random fill ไม่ซ้ำ
        const forced2 = [
          `${den1}${den2}`, // เด่นนำ
          `${den2}${den1}`, // เด่นกลับ
          `${den1}${secureRandom(0, 9)}`, // เด่น1 + random
          `${secureRandom(0, 9)}${den2}`, // random + เด่น2
        ]
        const twoDigits = getUniqueNumbers(8, 2, forced2)

        // 4. สามตัว 8 ชุด
        //    forced = เด่นทุกตำแหน่ง ไม่ซ้ำกันอีกต่อไป
        const r = () => secureRandom(0, 9)
        const forced3 = [
          `${den1}${den2}${r()}`, // เด่นนำ + random ท้าย
          `${r()}${den1}${den2}`, // random นำ + เด่นตาม
          `${den2}${r()}${den1}`, // สลับเด่น
          `${den1}${r()}${den2}`, // เด่นคั่น
        ]
        const threeDigits = getUniqueNumbers(8, 3, forced3)

        return {
          den1,
          den2,
          run: `${den1} - ${den2}`,
          twoDigits,
          doubles: [db1, db2],
          threeDigits,
        }
      }

      function awaitImageLoad(imgElem) {
        return new Promise(resolve => {
          if (imgElem.complete) return resolve()
          imgElem.onload = resolve
          imgElem.onerror = resolve
        })
      }

      async function generateImage() {
        // 1. อ่านค่า
        const type = document.getElementById('lotteryType').value
        let dateVal = document.getElementById('dateInput').value
        if (!dateVal) {
          dateVal = getTodayStr()
          document.getElementById('dateInput').value = dateVal
        }

        const data = LOTTERY_DATA[type] || LOTTERY_DATA['lao_normal']
        const fullDateStr = getFullThaiDate(dateVal)
        const nums = generateLogic()
        currentData = { name: data.name, dateStr: fullDateStr, nums }

        // 2. จัดการ UI Loading
        document.getElementById('placeholder').style.display = 'none'
        document.getElementById('previewImg').style.display = 'none'
        document.getElementById('actionBar').style.display = 'none'

        const loader = document.getElementById('loader')
        loader.style.display = 'flex'

        // 3. ยัดข้อมูลลง Template ใหม่
        const rTitle = document.getElementById('rTitle')
        rTitle.innerText = data.name

        // ลดขนาดฟอนต์อัตโนมัติถ้าชื่อหวยยาวเกินไป (ให้สอดคล้องกับขนาดใหม่ 1080)

          rTitle.style.fontSize = '60px'
        } else if (data.name.length > 10) {
          rTitle.style.fontSize = '75px'
        } else {
          rTitle.style.fontSize = '90px'
        }

        document.getElementById('rDateFull').innerText = fullDateStr

        // เด่น & วิ่งรูด
        document.getElementById('rDen1').innerText = nums.den1
        document.getElementById('rDen2').innerText = nums.den2
        document.getElementById('rRun').innerText = nums.run

        // สองตัว
        const grid2D = document.getElementById('rGrid2D')
        grid2D.innerHTML = nums.twoDigits
          .map(n => `<div class="num-item">${n}</div>`)
          .join('')

        // เบิ้ล
        document.getElementById('rDouble1').innerText = nums.doubles[0]
        document.getElementById('rDouble2').innerText = nums.doubles[1]

        // สามตัว
        const grid3D = document.getElementById('rGrid3D')
        grid3D.innerHTML = nums.threeDigits
          .map(n => `<div class="num-3item">${n}</div>`)
          .join('')

        // รูปธง
        const flagImg = document.getElementById('rFlag')
        const flagBg = document.getElementById('rFlagBg')
        flagImg.src = getFlagUrl(data.flag)
        flagBg.src = getFlagUrl(data.flag)

        // เปลี่ยนสี Header ให้สวยงามตามประเทศแบบ Premium Gradient
        const header = document.getElementById('cbHeader')
        if (data.flag === 'th')
          header.style.background =
            'linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%)'
        // แดงเข้มหรู
        else if (data.flag === 'vn')
          header.style.background =
            'linear-gradient(135deg, #9a3412 0%, #ea580c 100%)'
        // ส้มอิฐ
        else if (data.flag === 'my')
          header.style.background =
            'linear-gradient(135deg, #4c0519 0%, #9f1239 100%)'
        // แดงไวน์
        else if (data.flag === 'jp' || data.flag === 'cn' || data.flag === 'hk')
          header.style.background =
            'linear-gradient(135deg, #831843 0%, #be185d 100%)'
        // ชมพูเข้ม
        else
          header.style.background =
            'linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%)' // กรมท่า-น้ำเงิน (ค่าเริ่มต้นที่สวยที่สุด)

        try {
          await document.fonts.ready
          await Promise.all([awaitImageLoad(flagImg), awaitImageLoad(flagBg)])

          // 4. สั่งถ่ายรูป
          const renderZone = document.getElementById('renderZone')

            scale: 1.5, // ขยายให้ภาพชัดขึ้นอีกนิด
            useCORS: true,
            backgroundColor: '#ffffff',
            logging: false,
          })

          // 5. โชว์รูป

          const previewImg = document.getElementById('previewImg')
          previewImg.src = currentBase64Image

          loader.style.display = 'none'
          previewImg.style.display = 'block'
          document.getElementById('actionBar').style.display = 'flex'
        } catch (error) {
          console.error('Render Error:', error)
          alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง')
          loader.style.display = 'none'
          document.getElementById('placeholder').style.display = 'block'
        }
      }

        const link = document.createElement('a')
        link.download = getFilename()
        link.href = currentBase64Image

      }

      async function shareImage() {
        if (!currentBase64Image) return
        try {
          const res = await fetch(currentBase64Image)
          const blob = await res.blob()
          const file = new File([blob], getFilename(), { type: 'image/jpeg' })

          await navigator.share({
            title: 'โจ๊กหมู - เลขแนวทาง',
            files: [file],
          })
        } catch (err) {
          if (err.name !== 'AbortError') {
            alert('บราวเซอร์นี้ไม่รองรับการแชร์โดยตรงครับ 🐷')

      let availableCaptions = [...CAPTIONS_LIST]

      function getUniqueCaption(lotteryName) {
        if (availableCaptions.length === 0) {
          availableCaptions = [...CAPTIONS_LIST] // รีเซ็ตถ้าใช้ครบแล้ว
        }
        const randomIndex = Math.floor(Math.random() * availableCaptions.length)
        const selectedCaption = availableCaptions.splice(randomIndex, 1)[0]
        return selectedCaption.replace(/\[NAME\]/g, lotteryName)
      }

      async function copyCaption() {
        if (!currentData) return
        const { name, dateStr } = currentData

        // ดึงแคปชั่นที่สุ่มแล้วใส่ชื่อหวยเข้าไป
        const captionText = getUniqueCaption(name)

        // สร้างแฮชแท็กเฉพาะหวย (ลบเว้นวรรคออกเพื่อให้กดแท็กได้)
        const hashtagName = name.replace(/\s+/g, '')

        // ฟอร์แมตใหม่: ไม่มีตัวเลข มีแค่ชื่อหวย วันที่ และแคปชั่น พร้อมแฮชแท็กหวย
        const textToCopy = `🐷 แนวทาง ${name} 🐷\n🗓 ${dateStr}\n\n${captionText}\n\n#โจ๊กหมู #เลขแนวทาง #${hashtagName}`

        try {
          const textArea = document.createElement('textarea')
          textArea.value = textToCopy
          document.body.appendChild(textArea)
          textArea.select()
          document.execCommand('copy')
          document.body.removeChild(textArea)
          alert('📋 คัดลอกแคปชั่นเรียบร้อย!')
        } catch (err) {
          alert('คัดลอกไม่สำเร็จครับ กรุณาลองใหม่อีกครั้ง 🙏')
        }
      }

      // Init
      document.getElementById('dateInput').value = getTodayStr()
      if (
        navigator.canShare &&
        navigator.canShare({
          files: [new File([], 't.jpg', { type: 'image/jpeg' })],
        })
      ) {
        document.getElementById('shareBtn').style.display = 'inline-flex'
      }
